      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--card-color', item.color);
      card.style.animationDelay = `${delay * 0.07}s`;
      delay++;

      const detailsHTML = Object.entries(item.details).map(([k, v]) => `
        <div class="detail-box">
          <div class="detail-label">${k}</div>
          <div class="detail-value">${v}</div>
        </div>
      `).join('');

      const tagsHTML = item.tags.map(t => `<span class="tag">${t}</span>`).join('');

      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon">${item.icon}</div>
          <div class="card-title-block">
            <div class="card-title">${item.title}</div>
            <div class="card-subtitle">${item.subtitle}</div>
          </div>
          <div class="card-toggle">+</div>
        </div>
        <div class="card-body">
          <div class="card-content">
            <p>${item.description}</p>
            <div class="detail-grid">${detailsHTML}</div>
            <div class="tag-row">${tagsHTML}</div>
          </div>
        </div>
      `;

      card.querySelector('.card-header').addEventListener('click', () => {
        card.classList.toggle('open');
      });

      grid.appendChild(card);
    });
  });
}

function filterCards(cat, btn) {
  document.querySelectorAll('.anatomy-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  label.textContent = cat === 'Toate' ? '— Toate patologiile' : `— ${cat}`;
  label.style.animation = 'none';
  label.offsetHeight;
  label.style.animation = 'fadeUp 0.4s ease forwards';
  renderCards(cat);
}

renderCards('Toate');
</script>
