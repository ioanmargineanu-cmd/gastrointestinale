];

// Arrow SVG for the detail link
const ARROW_SVG = '<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';

// Build nav
const nav = document.getElementById('nav');
const categories = ['Toate', ...DATA.map(d => d.category)];
categories.forEach((cat, i) => {
  const btn = document.createElement('button');
  btn.className = 'anatomy-btn' + (i === 0 ? ' active' : '');
  btn.textContent = cat;
  btn.addEventListener('click', () => filterCards(cat, btn));
  nav.appendChild(btn);
});

// Build cards
const grid = document.getElementById('cardsGrid');
const label = document.getElementById('sectionLabel');

function renderCards(filter) {
  grid.innerHTML = '';
  let delay = 0;
  DATA.forEach(section => {
    if (filter !== 'Toate' && section.category !== filter) return;
    section.items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--card-color', item.color);
      card.style.animationDelay = delay * 0.07 + 's';
      delay++;

      const detailsHTML = Object.entries(item.details).map(([k, v]) =>
        '<div class="detail-box"><div class="detail-label">' + k + '</div><div class="detail-value">' + v + '</div></div>'
      ).join('');

      const tagsHTML = item.tags.map(t => '<span class="tag">' + t + '</span>').join('');

      card.innerHTML =
        '<div class="card-header">' +
          '<div class="card-icon">' + item.icon + '</div>' +
          '<div class="card-title-block">' +
            '<div class="card-title">' + item.title + '</div>' +
            '<div class="card-subtitle">' + item.subtitle + '</div>' +
          '</div>' +
          '<div class="card-toggle">+</div>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-content">' +
            '<p>' + item.description + '</p>' +
            '<div class="detail-grid">' + detailsHTML + '</div>' +
            '<div class="tag-row">' + tagsHTML + '</div>' +
            '<a class="card-link" href="' + item.slug + '.html">Detalii complete ' + ARROW_SVG + '</a>' +
          '</div>' +
        '</div>';

      card.querySelector('.card-header').addEventListener('click', () => {
        card.classList.toggle('open');
      });

      grid.appendChild(card);
    });
  });
}

function filterCards(cat, btn) {
  document.querySelectorAll('.anatomy-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  label.textContent = cat === 'Toate' ? '\u2014 Toate patologiile' : '\u2014 ' + cat;
  label.style.animation = 'none';
  label.offsetHeight;
  label.style.animation = 'fadeUp 0.4s ease forwards';
  renderCards(cat);
}

renderCards('Toate');
</script>

</body>
</html>
